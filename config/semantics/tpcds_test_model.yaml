version: "0.1.1"
semantic_model:
  - name: tpcds
    description: TPC-DS benchmark semantic model for testing SQL pushdown
    datasets:
      - name: orders
        source: stg_orders
        primary_key:
          - order_id
        fields:
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_id
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
          - name: total_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: total_amount
          - name: order_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_date
            dimension:
              is_time: true
          - name: profit
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: amount - cost
          - name: quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: quantity

      - name: customers
        source: stg_customers
        primary_key:
          - customer_id
        fields:
          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
          - name: customer_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_name
          - name: region
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: region

    relationships:
      - name: orders_to_customers
        from: orders
        to: customers
        from_columns:
          - customer_id
        to_columns:
          - customer_id

    metrics:
      - name: revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(total_amount)
        description: Total revenue from orders

      - name: total_orders
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(order_id)
        description: Total number of orders

      - name: avg_profit
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(amount - cost)
        description: Average profit per order
